<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC - Bat To Chase</title>
</head>
<body>
    <div id="game-container">

        <h1>BTC >>> Bat To Chase</h1>

        <!-- TEAM SELECTION -->
        <div id="team-screen" class="screen active">
            <img id="ipl-logo"
                src="https://upload.wikimedia.org/wikipedia/en/thumb/8/84/Indian_Premier_League_Official_Logo.svg/1200px-Indian_Premier_League_Official_Logo.svg.png"
                alt="IPL Logo">

            <h2>Select Your Favourite Team</h2>

            <div class="team-grid">
                <button class="team-btn" data-team="MI">MI</button>
                <button class="team-btn" data-team="CSK">CSK</button>
                <button class="team-btn" data-team="RCB">RCB</button>
                <button class="team-btn" data-team="KKR">KKR</button>
                <button class="team-btn" data-team="DC">DC</button>
                <button class="team-btn" data-team="SRH">SRH</button>
                <button class="team-btn" data-team="RR">RR</button>
                <button class="team-btn" data-team="PBKS">PBKS</button>
                <button class="team-btn" data-team="GT">GT</button>
                <button class="team-btn" data-team="LSG">LSG</button>
            </div>
        </div>

        <!-- MENU -->
        <div id="menu-screen" class="screen">
            <img id="menu-team-logo" class="team-logo" alt="Team Logo">

            <h3 class="match-title"></h3>

            <p class="instructions">
                Chase the target in 5 overs with 5 wickets in hand.<br>
                You can score 1, 2, 4, 6, 8 and 10 runs!
            </p>

            <div class="level-select">
                <button class="level-btn" data-level="noob">Noob (100–150)</button>
                <button class="level-btn" data-level="pro">Pro (150–225)</button>
                <button class="level-btn" data-level="legend">Legend (225–300)</button>
            </div>

            <button id="change-team-btn" class="secondary-btn">
                Change Team
            </button>
        </div>

        <!-- GAME -->
        <div id="game-screen" class="screen">
            <h3 class="match-title game-mt"></h3>

            <div class="minimal-hud">
                <div class="score-row">
                    <span id="ui-player-team" class="team-name"></span>

                    <div class="main-score">
                        <span id="ui-score">0</span>
                        <span class="wicket-separator">/</span>
                        <span id="ui-wickets">0</span>
                    </div>
                </div>

                <div class="target-need-row">
                    <span>Target: <strong id="ui-target">0</strong></span>
                    <span class="spacer">|</span>
                    <span>Need: <strong id="ui-need">0 (30 balls)</strong></span>
                </div>
            </div>

            <div class="pitch">
                <div id="power-bar-wrapper">
                    <div id="power-bar-fill"></div>

                    <div class="tap-pad-content">
                        <button id="hit-btn" class="noselect">Tap or Hold</button>
                        <div id="action-text">Press Space or Tap</div>
                        <div id="last-ball-result">-</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- GAME OVER -->
        <div id="game-over-screen" class="screen">
            <h2 id="end-title">Match Lost :(</h2>
            <p id="end-message">You lost!</p>

            <p class="final-score">
                Final Score:
                <span id="end-score">0</span> /
                <span id="end-wickets">0</span>
            </p>

            <div id="leaderboard-container">
                <h4>Top 5 Legend Teams</h4>
                <ul id="leaderboard-list"></ul>
            </div>

            <button id="restart-btn">Play Again</button>
        </div>

    </div>

    <!-- FEEDBACK -->
    <a href="mailto:andromedcitizen@gmail.com?subject=Feedback to BTC" id="feedback-link">
        Send Feedback
    </a>

   <script src="script.js"></script>
</body>

</html>
